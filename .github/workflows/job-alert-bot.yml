name: Job Alert Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  crawl-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONUNBUFFERED: "1"
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
      LOCATIONS: ${{ secrets.LOCATIONS }}
      KEYWORDS: ${{ secrets.KEYWORDS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-chromedriver: true

      - name: Export Chrome paths
        run: |
          echo "CHROME_BIN=$(which chrome)" >> $GITHUB_ENV
          echo "CHROMEDRIVER_BIN=$(which chromedriver)" >> $GITHUB_ENV

      - name: Verify Chrome
        run: |
          chrome --version
          chromedriver --version

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state
          key: job-alert-state-${{ github.ref_name }}
          restore-keys: |
            job-alert-state-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug environment
        run: |
          echo "===== ENVIRONMENT CHECK ====="
          echo "LOG_LEVEL: ${LOG_LEVEL:+SET}"
          echo "LOCATIONS: ${LOCATIONS:+SET}"
          echo "KEYWORDS: ${KEYWORDS:+SET}"
          echo "TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:+SET}"
          echo "CHAT_ID: ${CHAT_ID:+SET}"

      - name: Debug state folder
        run: |
          echo "===== STATE DIRECTORY ====="
          ls -la state || true

          echo ""
          echo "===== SOURCES ====="
          if [ -f state/sources.json ]; then
            cat state/sources.json
          else
            echo "❌ state/sources.json NOT FOUND"
          fi

      - name: Run crawler
        timeout-minutes: 10
        shell: bash
        run: |
          set -e
          mkdir -p state

          echo "========== STARTING JOB BOT =========="

          python main.py | tee state/run.log

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state
          key: job-alert-state-${{ github.ref_name }}
