name: Job Alert Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONUNBUFFERED: "1"
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
      LOCATIONS: ${{ secrets.LOCATIONS }}
      KEYWORDS: ${{ secrets.KEYWORDS }}

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Install Chrome + ChromeDriver
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-chromedriver: true

      # Export Chrome paths
      - name: Export Chrome paths
        run: |
          echo "CHROME_BIN=$(which chrome)" >> $GITHUB_ENV
          echo "CHROMEDRIVER_BIN=$(which chromedriver)" >> $GITHUB_ENV

      # Verify installation
      - name: Verify Chrome
        run: |
          chrome --version
          chromedriver --version

      # Restore cached state
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state
          key: job-alert-state-${{ github.ref_name }}
          restore-keys: |
            job-alert-state-

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # DEBUG - Check environment variables
      - name: Debug environment
        run: |
          echo "===== ENVIRONMENT CHECK ====="
          if [ -z "$LOG_LEVEL" ]; then
            echo "❌ LOG_LEVEL is EMPTY"
          else
            echo "✅ LOG_LEVEL = $LOG_LEVEL"
          fi

          if [ -z "$LOCATIONS" ]; then
            echo "❌ LOCATIONS is EMPTY"
          else
            echo "✅ LOCATIONS = $LOCATIONS"
          fi

          if [ -z "$KEYWORDS" ]; then
            echo "❌ KEYWORDS is EMPTY"
          else
            echo "✅ KEYWORDS = $KEYWORDS"
          fi

      # Run crawler
      - name: Run crawler
        timeout-minutes: 10
        shell: bash
        run: |
          set -o pipefail
          mkdir -p state

          exit_code=1

          for attempt in 1 2 3; do
            echo "========== Attempt ${attempt}/3 =========="

            if python main.py 2>&1 | tee "state/run-${attempt}.log"; then
              echo "Crawler completed successfully."
              exit_code=0
              break
            fi

            exit_code=$?

            if [[ ${attempt} -lt 3 ]]; then
              echo "Retrying in 15 seconds..."
              sleep 15
            fi
          done

          exit ${exit_code}

      # Save updated state cache
      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state
          key: job-alert-state-${{ github.ref_name }}

      # Commit updated state
      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f state || true

          if git diff --cached --quiet; then
            echo "No state changes."
            exit 0
          fi

          git commit -m "Update crawler state"

          git pull --rebase origin "${{ github.ref_name }}"

          git push
