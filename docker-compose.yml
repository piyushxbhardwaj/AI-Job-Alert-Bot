services:
  bot:
    build: .
    env_file:
      - .env
    volumes:
      - ./state:/app/state
    command: sh -c "while true; do python main.py; sleep ${BOT_INTERVAL_SECONDS:-900}; done"
    restart: unless-stopped

  dashboard:
    build: .
    env_file:
      - .env
    volumes:
      - ./state:/app/state
    command: streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port 8501 --server.headless true
    ports:
      - "8501:8501"
    restart: unless-stopped